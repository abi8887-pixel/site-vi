<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIF Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        /* Only Dashboard-specific layout styles go here. Colors & Buttons come from style.css */
        body { display: flex; height: 100vh; overflow: hidden; padding: 0; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; z-index: 10; }
        .logo { font-family: 'Sora', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 16px; border-radius: var(--radius-sm); color: var(--text-2); cursor: pointer; transition: var(--transition); font-weight: 500; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: var(--nav-active-bg); color: var(--primary); }
        
        /* MAIN CONTENT */
        .main { flex: 1; padding: 30px 40px; overflow-y: auto; background: var(--bg); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-family: 'Sora', sans-serif; font-size: 1.8rem; color: var(--text); }
        
        /* STATS CARDS */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--card-shadow); transition: var(--transition); }
        .stat-card:hover { border-color: rgba(59,130,246,0.3); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .stat-card h3 { color: var(--text-2); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
        .stat-card .value { font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 700; color: var(--primary); }
        
        /* DATA TABLE */
        .table-container { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--card-shadow); }
        .table-toolbar { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; background: var(--surface-2); }
        input.search { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); padding: 9px 16px; border-radius: var(--radius-sm); width: 300px; font-family: 'DM Sans', sans-serif; transition: var(--transition); }
        input.search:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 0.88rem; color: var(--text); }
        th { color: var(--text-2); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; background: var(--surface-2); }
        tr:hover { background: var(--surface-3); }
        
        .file-no-font { font-family: 'DM Mono', monospace; color: var(--primary); font-weight: 500; font-size: 0.85rem;}
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🏢 SIF Manager</div>
        <div class="nav-item active">📊 Live Feed</div>
        <div class="nav-item">🗺️ Map View</div>
        <div class="nav-item" onclick="toggleTheme()">☀️ Toggle Theme</div>
    </div>

    <div class="main">
        <div class="header">
            <h1>Command Center</h1>
            <button onclick="fetchData()" class="btn btn-primary" id="refreshBtn">🔄 Refresh Data</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Total Inspections</h3><div class="value" id="statTotal">--</div></div>
            <div class="stat-card"><h3>ICICI Bank</h3><div class="value" id="statICICI">--</div></div>
            <div class="stat-card"><h3>South Indian Bank</h3><div class="value" id="statSIB">--</div></div>
            <div class="stat-card"><h3>Pending Sync</h3><div class="value" style="color: var(--warn);">0</div></div>
        </div>

        <div class="table-container">
            <div class="table-toolbar">
                <input type="text" class="search" placeholder="Search by Applicant, File No, or Bank..." id="searchInput" onkeyup="filterTable()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>File No</th>
                        <th>Applicant</th>
                        <th>Bank</th>
                        <th>Taluk</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align:center; color: var(--text-2); padding: 40px 0;">Click "Refresh Data" to load...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Use the exact same theme toggler logic from index.html
        function toggleTheme() {
            const html = document.documentElement;
            const n = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', n);
            localStorage.setItem('sif_theme', n);
        }
        (function initTheme() {
            const saved = localStorage.getItem('sif_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();

        // 🚀 PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
        const API_URL = "https://script.google.com/macros/s/AKfycbxe2XhcX8r7AtQ2TaqHxNqBuxmxyv8TiiG_GKkjRqLcTQ1dLbkJ3cDAxRW5GUNt2TSf2Q/exec"; 
        
        let globalData = [];

        async function fetchData() {
            const btn = document.getElementById('refreshBtn');
            btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;"></span> Syncing...';
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--text-2); padding: 40px 0;"><span class="spinner" style="border-color: var(--primary); border-top-color: transparent;"></span> Fetching secure data...</td></tr>';
            
            try {
                const response = await fetch(`${API_URL}?action=getDashboardData`);
                const result = await response.json();
                
                if(result.status === 'ok') {
                    globalData = result.data;
                    updateDashboard(globalData);
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--danger); padding: 40px 0;">Connection failed. Check API URL.</td></tr>';
            } finally {
                btn.innerHTML = '🔄 Refresh Data';
            }
        }

        function updateDashboard(data) {
            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statICICI').innerText = data.filter(r => r.Bank && r.Bank.includes('ICICI')).length;
            document.getElementById('statSIB').innerText = data.filter(r => r.Bank && r.Bank.includes('South Indian')).length;

            const tbody = document.getElementById('tableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--text-2); padding: 40px 0;">No records found.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(row => `
                <tr>
                    <td style="color: var(--text-2); font-size: 0.8rem;">${row['Timestamp'] ? row['Timestamp'].substring(0, 11) : '---'}</td>
                    <td class="file-no-font">${row['File No.'] || '---'}</td>
                    <td style="font-weight: 600;">${row['Applicant'] || '---'}</td>
                    <td>${row['Bank'] || '---'}</td>
                    <td>${row['Taluk'] || '---'}</td>
                    <td><span class="badge badge-synced">✓ Verified</span></td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = globalData.filter(row => 
                (row['Applicant'] && row['Applicant'].toLowerCase().includes(query)) ||
                (row['File No.'] && row['File No.'].toLowerCase().includes(query)) ||
                (row['Bank'] && row['Bank'].toLowerCase().includes(query))
            );
            updateDashboard(filtered);
        }
    </script>
</body>
</html>
